<!DOCTYPE html>
<html>
<head>
    <title>Slide Presentation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #fafafa, #e9e9e9);
            margin: 0;
            padding: 30px 20px;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2em;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.5px;
        }

        img {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            display: block;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            padding: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>

    <h1>Presentation Slides</h1>

    <img src="assets/images/slides/CoverTBD.JPG" alt="CoverTBD">
    <img src="assets/images/slides/Home.JPG" alt="Home">
    <img src="assets/images/slides/SinglePlane.JPG" alt="SinglePlane">
    <img src="assets/images/slides/TwoPlane.JPG" alt="TwoPlane">
    <img src="assets/images/slides/4Run.JPG" alt="4Run">
    <img src="assets/images/slides/WtMgr.JPG" alt="WtMgr">
    <img src="assets/images/slides/Severity.JPG" alt="Severity">
    <img src="assets/images/slides/TWEst.JPG" alt="TWEst">

</body>
</html>
