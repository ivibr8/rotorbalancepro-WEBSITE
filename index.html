<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RotorBalance Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f7f9fc, #e6e9ef);
            margin: 0;
            padding: 30px 20px;
            line-height: 1.6;
            color: #222;
        }

        .nav {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #003366;
            font-weight: bold;
            font-size: 1.1em;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 2.6em;
            color: #003366;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.15em;
            color: #333;
            max-width: 700px;
            margin: 0 auto 20px auto;
        }

        .hero-image {
            width: 70%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.18);
            margin: 25px auto;
            display: block;
        }

        .hero-buttons {
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            padding: 12px 22px;
            margin: 8px 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.05em;
        }

        .button-primary {
            background: #003366;
            color: #fff;
        }

        .button-secondary {
            background: #ffffff;
            color: #003366;
            border: 1px solid #003366;
        }

        .section {
            margin: 40px 0;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 24px 26px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.12);
        }

        .section h2 {
            margin-top: 0;
            color: #003366;
            font-size: 1.6em;
        }

        .two-column {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .column {
            flex: 1 1 280px;
        }

        .column h3 {
            margin-top: 0;
            color: #003366;
            font-size: 1.25em;
        }

        .column ul {
            padding-left: 20px;
            margin: 8px 0 0 0;
        }

        .column li {
            margin-bottom: 6px;
        }
